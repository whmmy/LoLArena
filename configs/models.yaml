# LoLArena — model registry
#
# ONE prediction per model per match/game. Every model:
#   - receives the SAME context_pack (PandaScore)
#   - has the SAME `web_search` tool mounted (Zhipu backend) — see adapters/websearch.py
#   - decides itself what to search, then reasons and emits strict JSON
#
# Categories are informational only now (no S1/S2 split). They hint at the
# provider routing + whether the model speaks the OpenAI tool-calling protocol.
#
# base_url_env: name an env var that, if set and non-empty, OVERRIDES base_url
# at runtime (use it to route through a proxy / 中转 without editing this file).
# If LOLA_MODEL_PROXY is set globally, ALL models route through that single base_url.

models:
  # ---------------- Frontier (proprietary) ----------------
  - id: gpt-5
    display_name: GPT-5
    provider: openai
    model: gpt-5
    api_key_env: OPENAI_API_KEY
    base_url_env: OPENAI_BASE_URL
    base_url: https://api.openai.com/v1
    price_per_mtok: { input: 2.50, output: 15.00 }
    json_mode: true
    timeout_seconds: 180

  - id: claude-opus-4
    display_name: Claude Opus 4
    provider: anthropic
    model: claude-opus-4
    api_key_env: ANTHROPIC_API_KEY
    base_url_env: ANTHROPIC_BASE_URL
    base_url: https://api.anthropic.com
    price_per_mtok: { input: 3.00, output: 15.00 }
    json_mode: false
    timeout_seconds: 180

  - id: gemini-3-pro
    display_name: Gemini 3 Pro
    provider: google
    model: gemini-3-pro
    api_key_env: GOOGLE_API_KEY
    base_url_env: GOOGLE_BASE_URL
    base_url: https://generativelanguage.googleapis.com/v1beta
    price_per_mtok: { input: 2.00, output: 8.00 }
    json_mode: true
    timeout_seconds: 180

  # ---------------- National / open-weight ----------------
  # Most are reached via OpenRouter (one key) or their native OpenAI-compatible endpoint.
  - id: glm-5.2
    display_name: GLM-5.2
    provider: zhipu
    model: glm-5.2
    api_key_env: ZHIPU_API_KEY
    base_url_env: ZHIPU_BASE_URL
    base_url: https://open.bigmodel.cn/api/paas/v4
    price_per_mtok: { input: 0.98, output: 3.08 }
    json_mode: true
    timeout_seconds: 180

  - id: deepseek-v4-pro
    display_name: DeepSeek V3 pro
    provider: deepseek
    model: deepseek-v4-pro
    api_key_env: DEEPSEEK_API_KEY
    base_url_env: DEEPSEEK_BASE_URL
    base_url: https://api.deepseek.com/v1
    price_per_mtok: { input: 0.40, output: 1.10 }
    json_mode: true
    timeout_seconds: 180

  - id: qwen-max
    display_name: Qwen Max
    provider: dashscope
    model: qwen-max
    api_key_env: DASHSCOPE_API_KEY
    base_url_env: DASHSCOPE_BASE_URL
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    price_per_mtok: { input: 1.60, output: 6.40 }
    json_mode: true
    timeout_seconds: 180

  - id: kimi-k2
    display_name: Kimi K2
    provider: moonshot
    model: kimi-k2-0905-preview
    api_key_env: MOONSHOT_API_KEY
    base_url_env: MOONSHOT_BASE_URL
    base_url: https://api.moonshot.cn/v1
    price_per_mtok: { input: 0.60, output: 2.50 }
    json_mode: true
    timeout_seconds: 180

  # ---------------- Optional extras (uncomment when you have a key) ----------------
  # - id: doubao-seed
  #   display_name: Doubao Seed 1.6
  #   provider: openrouter
  #   model: bytedance-seed/seed-1.6
  #   api_key_env: OPENROUTER_API_KEY
  #   base_url_env: OPENROUTER_BASE_URL
  #   base_url: https://openrouter.ai/api/v1
  #   json_mode: true
  #   timeout_seconds: 180
  - id: minimax-m3
    display_name: MiniMax M3
    provider: minimax
    model: MiniMax-M3
    api_key_env: MINIMAX_API_KEY
    base_url_env: MINIMAX_BASE_URL
    base_url: https://api.minimaxi.com/v1
    json_mode: true
    # M3 is a reasoning model (Interleaved Thinking); a single chat completion
    # inside the multi-round agent loop can exceed the 300s default. Give it headroom.
    timeout_seconds: 600
