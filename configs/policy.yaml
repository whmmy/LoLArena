# LoLArena — global prediction policy
#
# One unified flow per match/game:
#   system collects PandaScore context  ->  inject context_pack
#   -> mount the SAME web_search tool (Zhipu backend) on every model
#   -> each model decides what to search itself  ->  pure reasoning  ->  JSON

# What the system collects into context_pack.json (shared by every model).
# Data source: Cito API (see doc/citoapi-lol/). Blocks are grouped by quota cost.
context_pack:
  # --- core (cheap, ~1 req/team): always on ---
  fixture_header: true
  rosters: true              # /teams/{slug}/roster/history
  recent_form: true          # last N games per team (from team objectives)
  recent_form_window: 10
  h2h: true                  # derived from recent_form (0 extra requests)
  team_objectives: true      # aggregated dragon/baron/tower/gold control rates
  standings: true            # both teams' league rank + W/L
  meta_reference: true       # patch version
  # --- player-level (heavier, ~2 req/player x 10 = 20 req/match) ---
  # Turn off if quota is tight; models can still get this via web_search.
  player_form: true          # /players/{id}/form (recent KDA/cs/dmg)
  player_champion_pool: true # /players/{id}/champion-pool (BP preferences)
  hero_pools: true           # aggregated from player_champion_pool

# The unified web_search tool mounted on every model (see adapters/websearch.py).
web_search:
  enabled: true
  # Hard cap on tool calls per single prediction. Protects against runaway loops.
  max_calls_per_prediction: 12
  # Soft guidance surfaced in the prompt (model is free to search more or less).
  suggested_min_queries: 4
  default_count: 8
  default_recency: oneMonth   # oneDay | oneWeek | oneMonth | oneYear | noLimit

# Output / validation
policy:
  prediction_lock_hours_before_kickoff: 0   # series prediction already runs at T-3h
  result_fetch_grace_hours: 2
  leakage_audit: true
  require_reasoning: true
  max_format_retries: 2
  probability_sum_tolerance: 0.015
